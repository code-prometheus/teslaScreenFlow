name: Android CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  # 推送 tag 时触发 Release 构建
  push_tags:
    tags:
      - 'v*'

jobs:
  # ============================================================
  # PR / Push: 仅构建 Debug 版本 + 跑测试
  # ============================================================
  build:
    name: Build & Test
    if: github.event_name != 'push_tags'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Lint check
        run: ./gradlew lintDebug

  # ============================================================
  # Tag Push: 构建 Release APK + 签名 + 创建 GitHub Release
  # ============================================================
  release:
    name: Build & Release
    if: github.event_name == 'push_tags'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ---------- 生成签名密钥 ----------
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore tesla-screenflow.jks \
            -alias tesla-screenflow \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -dname "CN=teslaScreenFlow, OU=Dev, O=teslaScreenFlow, L=Shanghai, ST=Shanghai, C=CN"

      # ---------- 写入 keystore.properties ----------
      - name: Write keystore properties
        run: |
          echo "storeFile=tesla-screenflow.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=tesla-screenflow" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      # ---------- 构建 Release APK ----------
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # ---------- 获取版本号 ----------
      - name: Get version name
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "apk_path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT

      # ---------- 创建 GitHub Release ----------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "teslaScreenFlow ${{ steps.version.outputs.tag }}"
          body: |
            ## teslaScreenFlow ${{ steps.version.outputs.tag }}

            Android 手机端屏幕投屏 App，通过 WebRTC 将屏幕与音频实时串流至特斯拉焕新 Model 3 车机浏览器。

            ### 📱 安装方式

            1. 下载 `app-release.apk`
            2. 在 Android 手机上打开 APK 文件
            3. 允许「未知来源」安装
            4. 安装完成后打开 App

            ### 🚗 使用步骤

            1. 手机开启 Wi-Fi 热点
            2. 车机连接手机热点
            3. 打开 teslaScreenFlow → 点击「开始投屏」
            4. 车机浏览器访问 `http://<手机IP>:8080`

            ### ✨ 特性

            - H.264 硬件编码 4Mbps 60fps 投屏
            - OPUS 系统音频捕获 (< 150ms 延迟)
            - 车机触控回传操控手机
            - 适配焕新 Model 3 中控 + 后排屏幕

            ### 🔗 详细文档

            参见 [README.md](https://github.com/code-prometheus/teslaScreenFlow/blob/main/README.md)
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
