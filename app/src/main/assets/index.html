<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>teslaScreenFlow</title>
<style>
* { cursor: none; margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100vw; height: 100vh; margin: 0; background: #000; overflow: hidden; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
#screen { width: 100%; height: 100%; object-fit: contain; display: block; }
</style>
</head>
<body>
<img id="screen" />

<script>
(function () {
 'use strict';

 var ws = null;
 var screenEl = document.getElementById('screen');
 var proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
 var WS_URL = proto + location.hostname + ':' + location.port;

 function connect() {
  if (ws) { ws.onclose = null; ws.onerror = null; ws.close(); }
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';

  ws.onmessage = function (e) {
   if (e.data instanceof ArrayBuffer) {
    var blob = new Blob([e.data], { type: 'image/jpeg' });
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function () { screenEl.src = url; setTimeout(function () { URL.revokeObjectURL(url); }, 1000); };
    img.src = url;
   }
  };

  ws.onclose = function () { setTimeout(connect, 1000); };
  ws.onerror = function () { ws.close(); };
 }

 function sendTouch(type, x, y) {
  if (ws && ws.readyState === WebSocket.OPEN) {
   ws.send(JSON.stringify({ type: 'touch', action: type, x: x, y: y }));
  }
 }

 function setupTouch(el) {
  el.addEventListener('touchstart', function (e) { e.preventDefault(); handleTouch(e, 'down'); }, { passive: false });
  el.addEventListener('touchmove', function (e) { e.preventDefault(); handleTouch(e, 'move'); }, { passive: false });
  el.addEventListener('touchend', function (e) { e.preventDefault(); handleTouch(e, 'up'); }, { passive: false });
  el.addEventListener('touchcancel', function (e) { e.preventDefault(); handleTouch(e, 'up'); }, { passive: false });
 }

 function handleTouch(e, action) {
  var rect = screenEl.getBoundingClientRect();
  var w = rect.width || screenEl.offsetWidth;
  var h = rect.height || screenEl.offsetHeight;
  for (var i = 0; i < e.changedTouches.length; i++) {
   var t = e.changedTouches[i];
   sendTouch(action, Math.min(1, Math.max(0, (t.clientX - rect.left) / w)), Math.min(1, Math.max(0, (t.clientY - rect.top) / h)));
  }
 }

 setupTouch(screenEl);
 connect();
})();
</script>
</body>
</html>
